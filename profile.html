<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>connolly.cloud</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>&#9729;</text></svg>">
  <link rel="stylesheet" href="style.css">
  <script src="assets/markdown.js"></script>
</head>
<body>
  <main id="app">
    <p class="loading">Loading&hellip;</p>
  </main>

  <script>
    var esc = md.escapeHtml;

    function qs(name) {
      return new URLSearchParams(location.search).get(name);
    }

    function slugOf(file) {
      return file.replace(/\.md$/, "").replace(/^\d{4}-\d{2}-\d{2}-/, "");
    }

    function dateFromFilename(file) {
      var m = /^(\d{4}-\d{2}-\d{2})/.exec(file);
      return m ? m[1] : null;
    }

    function linkList(links) {
      if (!links || !links.length) return "";
      return '<ul class="links">' + links.map(function (l) {
        return '<li><a href="' + esc(l.url) + '">' + esc(l.label) + "</a></li>";
      }).join("") + "</ul>";
    }

    function renderProfile(person) {
      var avatar = person.avatar
        ? '<img class="avatar avatar-lg" src="' + esc(person.avatar) + '" alt="" width="96" height="96">'
        : "";
      var role = person.role ? '<span class="role">' + esc(person.role) + "</span>" : "";
      return '<header class="profile-head">' +
        '<p class="crumb"><a href="./">&larr; connolly.cloud</a></p>' +
        '<div class="person-head">' + avatar +
          "<div><h1>" + esc(person.name) + "</h1>" + role + "</div>" +
        "</div>" +
        (person.description ? "<p class=\"bio\">" + esc(person.description) + "</p>" : "") +
        linkList(person.links) +
      "</header>";
    }

    function renderPost(post) {
      var when = post.date
        ? '<time datetime="' + esc(post.date) + '"><a href="#' + esc(post.slug) + '">' + esc(md.formatDate(post.date)) + "</a></time>"
        : "";
      var title = post.title ? "<h2>" + esc(post.title) + "</h2>" : "";
      return '<article class="post" id="' + esc(post.slug) + '">' +
        '<div class="post-meta">' + when + "</div>" +
        title +
        '<div class="post-body">' + md.render(post.body) + "</div>" +
      "</article>";
    }

    function loadPosts(userId) {
      return fetch("posts.json")
        .then(function (r) { return r.ok ? r.json() : {}; })
        .catch(function () { return {}; })
        .then(function (manifest) {
          var files = (manifest && manifest[userId]) || [];
          return Promise.all(files.map(function (file) {
            return fetch("posts/" + userId + "/" + file)
              .then(function (r) { return r.ok ? r.text() : null; })
              .then(function (text) {
                if (text == null) return null;
                var parsed = md.parse(text);
                return {
                  slug: slugOf(file),
                  title: parsed.meta.title || "",
                  date: parsed.meta.date || dateFromFilename(file) || "",
                  body: parsed.body
                };
              })
              .catch(function () { return null; });
          }));
        })
        .then(function (posts) {
          return posts.filter(Boolean).sort(function (a, b) {
            return (b.date || "").localeCompare(a.date || "");
          });
        });
    }

    var userId = qs("u");
    if (!userId) { location.replace("./"); }

    fetch("data.json")
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(function (data) {
        var person = (data.family || []).filter(function (p) { return p.id === userId; })[0];
        if (!person) {
          document.getElementById("app").innerHTML =
            '<p class="crumb"><a href="./">&larr; connolly.cloud</a></p>' +
            '<p class="error">No one here by that name.</p>';
          return;
        }
        document.title = person.name + " · connolly.cloud";
        document.getElementById("app").innerHTML = renderProfile(person) +
          '<section class="feed"><h2 class="feed-title">Posts</h2>' +
          '<p class="loading">Loading posts&hellip;</p></section>';

        loadPosts(userId).then(function (posts) {
          var feed = document.querySelector(".feed");
          var html = '<h2 class="feed-title">Posts</h2>';
          html += posts.length
            ? posts.map(renderPost).join("")
            : '<p class="muted">No posts yet.</p>';
          feed.innerHTML = html;
          if (location.hash) {
            var el = document.getElementById(location.hash.slice(1));
            if (el) el.scrollIntoView();
          }
        });
      })
      .catch(function (err) {
        document.getElementById("app").innerHTML =
          '<p class="error">Could not load profile (' + esc(err.message) + ").</p>";
      });
  </script>
</body>
</html>
